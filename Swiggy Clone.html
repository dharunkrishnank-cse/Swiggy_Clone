<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiggy Clone</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <!-- Header Section -->
    <header>
        <div class="container">
            <h1>Omato</h1>
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Search Section -->
    <section class="search-section">
        <div class="container">
            <h2>Order Food Online</h2>
            <input type="text" id="search-bar" placeholder="Search for restaurants or dishes...">
            <button onclick="search()">Search</button>
        </div>
    </section>

    <!-- Featured Restaurants Section -->
    <section class="restaurants-section">
        <div class="container">
            <h2>Featured Restaurants</h2>
            <div class="restaurant-list">
                <div class="restaurant-card">
                    <h3>Restaurant 1</h3>
                    <p>Best dishes: Pizza, Burger</p>
                </div>
                <div class="restaurant-card">
                    <h3>Restaurant 2</h3>
                    <p>Best dishes: Sushi, Ramen</p>
                </div>
                <div class="restaurant-card">
                    <h3>Restaurant 3</h3>
                    <p>Best dishes: Pasta, Salad</p>
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>

</html>
